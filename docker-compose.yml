services:
  db:
    image: postgis/postgis:16-3.4
    container_name: loop-postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: loop
      POSTGRES_PASSWORD: loop
      POSTGRES_DB: loop
    ports:
      # Host 5433 -> container 5432 (host 5432 is often taken by a local Postgres).
      - "5433:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loop -d loop"]
      interval: 5s
      timeout: 5s
      retries: 10
